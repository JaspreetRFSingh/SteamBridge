global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
  - job_name: 'kafka-connect'
    static_configs:
      - targets: ['kafka-connect:8083']
  - job_name: 'schema-registry'
    static_configs:
      - targets: ['schema-registry:8081']
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
